name = "coze2jianying-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# 步骤：
#   1. npm run db:create        ← 创建 D1 数据库，拿到 database_id
#   2. 将 database_id 填入下方
#   3. npm run db:init           ← 本地初始化表结构
#   4. npm run db:init:remote    ← 远程初始化表结构
#   5. npm run deploy            ← 部署 Worker

[[d1_databases]]
binding = "DB"
database_name = "coze-relay"
database_id = "c7f19912-7c96-4176-a45a-3692ba5a377a"

[vars]
# 可选：设置后所有请求必须携带 Authorization: Bearer <RELAY_SECRET>
# 留空则不校验
RELAY_SECRET = ""

# 录制数据的 TTL（秒），超出 created_at + TTL 的记录可被清理
# 默认 7 天
RECORD_TTL_SECONDS = "604800"

# 允许跨域访问的来源（逗号分隔）
CORS_ORIGINS = "https://coze.com,https://www.coze.com,https://coze.cn,https://www.coze.cn,http://localhost:3000"

[triggers]
# 每天 UTC 02:00 执行一次清理，可按需调整
crons = ["0 2 * * *"]
